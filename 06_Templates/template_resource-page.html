<!--
    Web Design OS - Resource Page
    =============================
    Minimal editorial wrapper that displays a rendered markdown
    file from a client folder in the browser. Generated by
    workflow_dashboard.md for every .md file in every active
    client folder so the Internal Resources tiles on the client
    workspace page have something to open.

    One template, used for all resource types (brief, client,
    project-state, strategy, copy, emails, feedback). The
    content body varies but the chrome is identical.

    File naming: the .md file at brief.md gets rendered to
    brief.html in the same folder, and so on.

    Brand tokens inherited from 01_Core/core_brand-visual.md
    via workflow_onboarding-brand-visual.md.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>[RESOURCE_TITLE] - [CLIENT_NAME]</title>

<!-- BRAND_FONTS_START - Replaced per designer during onboarding template review -->
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<!-- BRAND_FONTS_END -->

<style>
/* ============================================================
   BRAND TOKENS
   ============================================================ */
:root {
    --brand-serif: 'Fraunces', Georgia, serif;
    --brand-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --brand-ink: #1A1A19;
    --brand-paper: #FFFFFF;
    --brand-paper-pure: #FFFFFF;
    --brand-accent: #1A1A19;
    --brand-muted: #EBEBE8;
    --brand-surface: #F7F7F4;
    --brand-name: '[DESIGNER_NAME]';
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --ink: var(--brand-ink);
    --ink-soft: #2E2E2C;
    --ink-mute: #6B6B66;
    --ink-faint: #A3A39D;
    --paper: var(--brand-paper);
    --surface: var(--brand-surface);
    --muted: var(--brand-muted);
    --rule: #E8E8E4;
    --urgent: #C0392B;
    --high: #D97706;
}

html, body {
    font-family: var(--brand-sans);
    color: var(--ink);
    background: var(--paper);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-feature-settings: 'kern', 'liga', 'ss01';
    line-height: 1.5;
}

body {
    min-height: 100vh;
    padding: 32px 48px 80px;
    max-width: 820px;
    margin: 0 auto;
}

/* BACK LINK */
.back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 500;
    color: var(--ink-mute);
    text-decoration: none;
    letter-spacing: 0.02em;
    margin-bottom: 24px;
    transition: color 0.12s ease;
}
.back-link:hover { color: var(--ink); }
.back-link::before { content: '←'; font-size: 14px; }

/* HEADER */
.header {
    padding-bottom: 24px;
    margin-bottom: 36px;
    border-bottom: 1px solid var(--rule);
}

.header__eyebrow {
    font-family: var(--brand-sans);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-mute);
    margin-bottom: 10px;
}

.header__title {
    font-family: var(--brand-serif);
    font-size: 40px;
    font-weight: 400;
    line-height: 1.1;
    letter-spacing: -0.01em;
    color: var(--ink);
    margin-bottom: 12px;
}

.header__meta {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    font-size: 12px;
    color: var(--ink-mute);
    font-family: 'SF Mono', Monaco, Consolas, monospace;
}

.header__meta-item { display: flex; align-items: center; gap: 4px; }

.header__edit {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--ink-mute);
    text-decoration: none;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 4px 10px;
    border: 1px solid var(--rule);
    border-radius: 99px;
    transition: border-color 0.12s ease, color 0.12s ease;
    font-family: var(--brand-sans);
}

.header__edit:hover {
    border-color: var(--ink);
    color: var(--ink);
}

/* ============================================================
   PROSE BODY - editorial typography for rendered markdown
   ============================================================ */
.prose {
    font-family: var(--brand-sans);
    font-size: 15px;
    line-height: 1.65;
    color: var(--ink);
}

.prose h1,
.prose h2,
.prose h3,
.prose h4 {
    font-family: var(--brand-serif);
    font-weight: 400;
    color: var(--ink);
    letter-spacing: -0.01em;
    line-height: 1.2;
}

.prose h1 {
    font-size: 36px;
    margin-top: 48px;
    margin-bottom: 20px;
}

.prose h2 {
    font-size: 26px;
    margin-top: 44px;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--rule);
}

.prose h3 {
    font-size: 20px;
    margin-top: 32px;
    margin-bottom: 12px;
}

.prose h4 {
    font-size: 16px;
    font-weight: 500;
    font-family: var(--brand-sans);
    margin-top: 24px;
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-mute);
}

.prose p {
    margin-bottom: 16px;
    color: var(--ink-soft);
}

.prose ul,
.prose ol {
    margin: 12px 0 20px 24px;
    color: var(--ink-soft);
}

.prose li {
    margin-bottom: 6px;
    line-height: 1.55;
}

.prose li > p {
    margin-bottom: 6px;
}

.prose ul ul,
.prose ol ol {
    margin: 6px 0 6px 20px;
}

.prose code {
    font-family: 'SF Mono', Monaco, Consolas, monospace;
    font-size: 13px;
    background: var(--surface);
    padding: 1px 6px;
    border-radius: 3px;
    border: 1px solid var(--rule);
    color: var(--ink);
}

.prose pre {
    background: var(--surface);
    border: 1px solid var(--rule);
    border-radius: 6px;
    padding: 14px 18px;
    overflow-x: auto;
    margin: 16px 0 20px;
    font-size: 13px;
    line-height: 1.5;
}

.prose pre code {
    background: none;
    padding: 0;
    border: none;
    font-size: 13px;
}

.prose blockquote {
    border-left: 2px solid var(--ink);
    padding-left: 18px;
    margin: 18px 0;
    color: var(--ink-mute);
    font-style: italic;
    font-family: var(--brand-serif);
    font-size: 16px;
}

.prose a {
    color: var(--ink);
    text-decoration: underline;
    text-decoration-color: var(--ink-faint);
    text-underline-offset: 2px;
    transition: text-decoration-color 0.12s ease;
}

.prose a:hover {
    text-decoration-color: var(--ink);
}

.prose hr {
    border: none;
    border-top: 1px solid var(--rule);
    margin: 32px 0;
}

.prose table {
    width: 100%;
    border-collapse: collapse;
    margin: 16px 0 24px;
    font-size: 13px;
}

.prose th,
.prose td {
    padding: 8px 12px;
    border-bottom: 1px solid var(--rule);
    text-align: left;
}

.prose th {
    font-weight: 600;
    color: var(--ink);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
}

.prose td {
    color: var(--ink-soft);
}

.prose input[type="checkbox"] {
    margin-right: 6px;
    accent-color: var(--ink);
}

/* FOOTER */
.footer {
    margin-top: 64px;
    padding-top: 20px;
    border-top: 1px solid var(--rule);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    color: var(--ink-faint);
    letter-spacing: 0.04em;
}

.footer__left::before { content: var(--brand-name); text-transform: uppercase; }
.footer__right { font-variant-numeric: tabular-nums; }

@media (max-width: 720px) {
    body { padding: 24px 16px 60px; }
    .header__title { font-size: 30px; }
    .prose { font-size: 14px; }
    .prose h1 { font-size: 28px; }
    .prose h2 { font-size: 22px; }
    .prose h3 { font-size: 18px; }
}
</style>
</head>
<body>

<a class="back-link" href="workspace.html">Back to workspace</a>

<header class="header">
    <div class="header__eyebrow">[CLIENT_NAME] / [RESOURCE_KIND]</div>
    <h1 class="header__title">[RESOURCE_TITLE]</h1>
    <div class="header__meta">
        <div class="header__meta-item">[SOURCE_FILE_PATH]</div>
        <div class="header__meta-item">Updated [LAST_MODIFIED]</div>
    </div>
</header>

<!-- PROSE BODY -->
<div class="prose">
    <!-- RESOURCE_BODY_START
         Populated by workflow_dashboard.md. The workflow reads
         the source .md file, converts its markdown to HTML, and
         injects the result here. Standard markdown → HTML rules:

         - # h1 → <h1>
         - ## h2 → <h2>
         - ### h3 → <h3>
         - **bold** → <strong>
         - *italic* → <em>
         - `code` → <code>
         - ```code blocks``` → <pre><code>
         - [text](url) → <a>
         - - item → <ul><li>
         - 1. item → <ol><li>
         - - [ ] → checkbox unchecked
         - - [x] → checkbox checked
         - > quote → <blockquote>
         - --- → <hr>
         - | table | → <table>

         Strip the YAML frontmatter at the top of the source
         .md file - don't render it. Start from the first non-
         frontmatter content line.
    -->
    <p style="color: var(--ink-mute); font-style: italic;">This page is a rendered view of the source markdown file. The markdown is the source of truth. If you need to edit, open the .md file in your editor.</p>
    <!-- RESOURCE_BODY_END -->
</div>

<footer class="footer">
    <div class="footer__left"></div>
    <div class="footer__right">Generated [DATE] / Web Design OS</div>
</footer>

</body>
</html>
